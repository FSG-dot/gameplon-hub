<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>핑거스타일 영상 기반 기타 악보 메이커</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header>
        <p class="eyebrow">Video → Fingerstyle Tab</p>
        <h1>어쿠스틱 기타 영상 자동 악보 생성기</h1>
        <p class="lead">
          연주 영상(mp4/webm)을 업로드하면 오디오를 분석해 <strong>기타 TAB 이벤트</strong>를 만들고,
          재생 시점에 맞춰 악보가 자동으로 이동합니다.
        </p>
      </header>

      <section class="panel controls-panel">
        <div class="field-row">
          <label for="videoFile">1) 연주 영상 업로드</label>
          <input id="videoFile" type="file" accept="video/*" />
        </div>
        <div class="field-row">
          <label for="tempo">2) 평균 템포(BPM, 선택)</label>
          <input id="tempo" type="number" min="40" max="240" value="96" />
        </div>
        <button id="analyzeBtn" class="primary" disabled>영상 분석 후 악보 생성</button>
        <div class="export-row">
          <button id="exportTxtBtn" class="secondary" disabled>악보 추출 (.txt)</button>
          <button id="exportJsonBtn" class="secondary" disabled>악보 추출 (.json)</button>
        </div>
        <p id="status" class="status">영상을 선택해주세요.</p>
      </section>

      <section class="workspace">
        <article class="panel video-panel">
          <h2>연주 영상</h2>
          <video id="player" controls playsinline></video>
        </article>

        <article class="panel tab-panel">
          <h2>자동 생성 TAB (동기화 스크롤)</h2>
          <div id="tabViewport" class="tab-viewport">
            <div id="playhead" class="playhead" aria-hidden="true"></div>
            <div id="tabTrack" class="tab-track"></div>
          </div>
          <div id="tabLegend" class="legend">생성된 노트가 없습니다.</div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
